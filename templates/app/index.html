{% extends "app/base.html" %}
{% load static %}

{% block content %}
<section class="hero-banner">
    <button class="nav-btn prev">&#10094;</button>

    <div class="banner-content">
        <div class="banner-text">
            <span id = "banner-subtitle"></span>

            <h1 id = "banner-title"></h1>

            <p id = "banner-description">

            </p>


        </div>

        <div class="banner-images" id = "banner-image">
            <img src="{% static "./app/images/headphones1.png" %}" alt="Headphones">
            <img src="{% static "./app/images/watch.png" %}" alt="Smart Watch">
            <img src="{% static "./app/images/plant.png" %}" alt="Plant">
        </div>
    </div>

    <button class="nav-btn next">&#10095;</button>
</section>


{% endblock content %}

{% block scripts %}
<script>
   const banners = [
     {% for banner in banners %}
     {
        id: {{banner.id}},
        subtitle: "{{banner.subtitle|escapejs}}",
        title: "{{banner.title|escapejs}}",
        description: "{{banner.description|escapejs}}",
        image1: "{{banner.image1.url}}",
        image2: "{{banner.image2.url}}",
        image3: "{{banner.image3.url}}"
     },
     
     
     
     {% endfor %}
   ]
</script>

<script src = "{% static "./app/js/app.js" %}"></script>
{% endblock scripts %}
